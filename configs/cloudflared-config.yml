# Cloudflare Tunnel Configuration for Project Janus
# File: /etc/cloudflared/config.yml
# Location: Cloudflare Tunnel LXC container

tunnel: YOUR_TUNNEL_ID
credentials-file: /root/.cloudflared/YOUR_TUNNEL_ID.json

ingress:
  # ============================
  # Project Janus (VLESS Proxy)
  # ============================
  # Routes WebSocket traffic from Cloudflare to the Xray container
  # Client connects to: janus.yourdomain.com:443 (Cloudflare edge)
  # Cloudflare forwards to: http://192.168.0.103:8080 (internal LXC)
  - hostname: janus.yourdomain.com
    service: http://192.168.0.103:8080

  # ============================
  # Other services (examples)
  # ============================
  # - hostname: blog.yourdomain.com
  #   service: http://192.168.0.115:8081
  #
  # - hostname: media.yourdomain.com
  #   service: http://192.168.0.110:8096

  # ============================
  # Catch-all (required)
  # ============================
  - service: http_status:404
